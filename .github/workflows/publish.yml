name: Publish to Stores

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 1.1.2) or 'latest' for latest production release"
        type: string
        default: latest

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Resolve Version ──────────────────────────────────────────────
  # Determines the target tag from input. "latest" resolves to the most
  # recent non-prerelease GitHub Release tag.

  resolve-version:
    name: Resolve Version
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve target version
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ "$INPUT_VERSION" = "latest" ]; then
            TAG=$(gh release list --exclude-pre-releases --limit 1 --json tagName -q '.[0].tagName')
            if [ -z "$TAG" ]; then
              echo "::error::No production release found"
              exit 1
            fi
          else
            TAG="v${INPUT_VERSION}"
          fi

          # Verify the tag exists
          if ! git rev-parse "$TAG" > /dev/null 2>&1; then
            echo "::error::Tag $TAG does not exist"
            exit 1
          fi

          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved: tag=$TAG version=$VERSION"

  # ── Quality Gate ─────────────────────────────────────────────────
  # Runs the full CI suite against the exact tag commit.

  quality-gate:
    name: Quality Gate
    needs: resolve-version
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve-version.outputs.tag }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript compile check
        run: pnpm compile

      - name: Run tests
        run: pnpm test

      - name: Lint
        run: pnpm lint

      - name: i18n lint
        run: npx tsx scripts/lint-i18n.ts

      - name: Format check
        run: pnpm format:check

  # ── Store Publishing ─────────────────────────────────────────────
  # Each job checks out the resolved tag, builds from source, and
  # publishes to the target store. Known conflicts exit 0 with a
  # descriptive outcome for the summary report.

  publish-chrome:
    name: Publish to Chrome Web Store
    needs: [resolve-version, quality-gate]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      outcome: ${{ steps.upload.outputs.outcome }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve-version.outputs.tag }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and package (Chromium)
        run: pnpm zip

      - name: Upload and publish to Chrome Web Store
        id: upload
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          ZIP_PATH=$(ls .output/*-chrome-mv3.zip)
          echo "Uploading $ZIP_PATH to Chrome Web Store..."

          OUTPUT=$(npx -y chrome-webstore-upload-cli upload \
            --source "$ZIP_PATH" \
            --extension-id "$EXTENSION_ID" \
            --client-id "$CLIENT_ID" \
            --client-secret "$CLIENT_SECRET" \
            --refresh-token "$REFRESH_TOKEN" \
            --auto-publish 2>&1) || true
          echo "$OUTPUT"

          # Graceful exit: item is locked in pending review from a prior submission
          if echo "$OUTPUT" | grep -q "ITEM_NOT_UPDATABLE"; then
            echo "::warning::Chrome Web Store: item is pending review, skipping upload"
            echo "outcome=skipped-pending-review" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Any other upload failure is a real error
          if echo "$OUTPUT" | grep -qi "FAILURE\|error"; then
            echo "::error::Chrome Web Store upload failed"
            exit 1
          fi

          echo "outcome=published" >> "$GITHUB_OUTPUT"

  publish-firefox:
    name: Publish to Firefox AMO
    needs: [resolve-version, quality-gate]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      outcome: ${{ steps.sign.outputs.outcome }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve-version.outputs.tag }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (Firefox)
        run: pnpm build:firefox

      - name: Package source code for AMO review
        run: git archive --format=zip --output=source-code.zip HEAD

      - name: Sign and submit to AMO
        id: sign
        run: |
          echo "Submitting to Firefox AMO (listed channel)..."

          EXIT_CODE=0
          OUTPUT=$(npx -y web-ext sign \
            --source-dir .output/firefox-mv3 \
            --channel listed \
            --api-key "${{ secrets.FIREFOX_API_KEY }}" \
            --api-secret "${{ secrets.FIREFOX_API_SECRET }}" \
            --upload-source-code source-code.zip 2>&1) || EXIT_CODE=$?
          echo "$OUTPUT"

          # Graceful exit: this version was already signed in a prior run
          if echo "$OUTPUT" | grep -q "already exists"; then
            echo "::warning::Firefox AMO: version already submitted, skipping"
            echo "outcome=skipped-version-exists" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$EXIT_CODE" -ne 0 ]; then exit $EXIT_CODE; fi
          echo "outcome=published" >> "$GITHUB_OUTPUT"

  publish-edge:
    name: Publish to Edge Add-ons
    needs: [resolve-version, quality-gate]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      outcome: ${{ steps.upload.outputs.outcome }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve-version.outputs.tag }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and package (Chromium)
        run: pnpm zip

      - name: Upload and publish to Edge Add-ons
        id: upload
        env:
          PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
          CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          API_KEY: ${{ secrets.EDGE_API_KEY }}
        run: |
          ZIP_PATH=$(ls .output/*-chrome-mv3.zip)
          echo "Uploading $ZIP_PATH to Edge Add-ons..."

          # Upload package to draft submission (API returns 202 with Location header)
          UPLOAD_HEADERS=$(mktemp)
          UPLOAD_BODY=$(mktemp)
          UPLOAD_STATUS=$(curl -s -o "$UPLOAD_BODY" -D "$UPLOAD_HEADERS" -w "%{http_code}" -X POST \
            "https://api.addons.microsoftedge.microsoft.com/v1/products/${PRODUCT_ID}/submissions/draft/package" \
            -H "Authorization: ApiKey ${API_KEY}" \
            -H "X-ClientID: ${CLIENT_ID}" \
            -H "Content-Type: application/zip" \
            --data-binary "@${ZIP_PATH}")

          echo "Upload HTTP status: $UPLOAD_STATUS"
          cat "$UPLOAD_HEADERS" | head -10

          if [ "$UPLOAD_STATUS" != "202" ]; then
            echo "::error::Edge Add-ons upload failed (HTTP $UPLOAD_STATUS)"
            cat "$UPLOAD_BODY"
            exit 1
          fi

          # Extract operation ID from Location header path using basename
          LOCATION=$(grep -i "^location:" "$UPLOAD_HEADERS" | awk '{print $2}' | tr -d '\r\n')
          OPERATION_ID=$(basename "$LOCATION")
          echo "Upload operation ID: $OPERATION_ID"

          if [ -z "$OPERATION_ID" ] || [ "$OPERATION_ID" = "/" ]; then
            echo "::error::Edge Add-ons: failed to extract operation ID from Location header"
            exit 1
          fi

          # Poll until upload validation completes (max 5 minutes)
          for i in $(seq 1 30); do
            sleep 10
            POLL_RESPONSE=$(curl -s \
              "https://api.addons.microsoftedge.microsoft.com/v1/products/${PRODUCT_ID}/submissions/draft/package/operations/${OPERATION_ID}" \
              -H "Authorization: ApiKey ${API_KEY}" \
              -H "X-ClientID: ${CLIENT_ID}")
            STATUS=$(echo "$POLL_RESPONSE" | jq -r '.status // empty')
            echo "Poll attempt $i: status=$STATUS"
            if [ "$STATUS" = "Succeeded" ]; then break; fi
            if [ "$STATUS" = "Failed" ]; then
              echo "::error::Edge Add-ons package validation failed"
              echo "$POLL_RESPONSE" | jq .
              exit 1
            fi
          done

          if [ "$STATUS" != "Succeeded" ]; then
            echo "::error::Edge Add-ons upload timed out after 5 minutes"
            exit 1
          fi

          # Submit draft for review
          echo "Publishing submission for review..."
          PUBLISH_BODY=$(mktemp)
          PUBLISH_STATUS=$(curl -s -o "$PUBLISH_BODY" -w "%{http_code}" -X POST \
            "https://api.addons.microsoftedge.microsoft.com/v1/products/${PRODUCT_ID}/submissions" \
            -H "Authorization: ApiKey ${API_KEY}" \
            -H "X-ClientID: ${CLIENT_ID}" \
            -H "Content-Type: application/json" \
            -d '{"notes":"Automated submission via CI/CD pipeline."}')

          echo "Publish HTTP status: $PUBLISH_STATUS"
          cat "$PUBLISH_BODY"

          # 202 = accepted for review, 200 = also success
          if [ "$PUBLISH_STATUS" = "202" ] || [ "$PUBLISH_STATUS" = "200" ]; then
            echo "Edge Add-ons submission published for review"
            echo "outcome=published" >> "$GITHUB_OUTPUT"
          elif [ "$PUBLISH_STATUS" = "404" ]; then
            # 404 = another submission is currently in review, blocking new publishes
            echo "::warning::Edge Add-ons: cannot publish — another submission is in review"
            echo "outcome=skipped-in-review" >> "$GITHUB_OUTPUT"
            exit 0
          else
            echo "::error::Edge Add-ons publish failed (HTTP $PUBLISH_STATUS)"
            exit 1
          fi

  # ── Publish Summary ──────────────────────────────────────────────
  # Aggregates results from all publish jobs into a single report.

  publish-summary:
    name: Publish Summary
    needs: [resolve-version, quality-gate, publish-chrome, publish-firefox, publish-edge]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Generate publish summary
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
          TAG: ${{ needs.resolve-version.outputs.tag }}
          QG_RESULT: ${{ needs.quality-gate.result }}
          CHROME_RESULT: ${{ needs.publish-chrome.result }}
          CHROME_OUTCOME: ${{ needs.publish-chrome.outputs.outcome }}
          FIREFOX_RESULT: ${{ needs.publish-firefox.result }}
          FIREFOX_OUTCOME: ${{ needs.publish-firefox.outputs.outcome }}
          EDGE_RESULT: ${{ needs.publish-edge.result }}
          EDGE_OUTCOME: ${{ needs.publish-edge.outputs.outcome }}
        run: |
          # Map job result to icon for pipeline stages
          pipeline_icon() {
            case "$1" in
              success) echo "✅ Passed" ;;
              failure) echo "❌ Failed" ;;
              skipped) echo "⏭️ Skipped" ;;
              *)       echo "❓ $1" ;;
            esac
          }

          # Map job result + outcome to icon for store publishing
          store_icon() {
            local result="$1" outcome="$2"
            case "$result" in
              skipped) echo "⏭️ Skipped" ;;
              failure) echo "❌ Failed" ;;
              success)
                case "$outcome" in
                  published)              echo "✅ Published" ;;
                  skipped-pending-review)  echo "⚠️ Skipped (pending review)" ;;
                  skipped-version-exists)  echo "⚠️ Skipped (version exists)" ;;
                  skipped-in-review)       echo "⚠️ Skipped (in review)" ;;
                  *)                      echo "✅ Success" ;;
                esac
                ;;
              *) echo "❓ $result" ;;
            esac
          }

          {
            echo "## 📦 Publish Summary"
            echo ""
            echo "**Version:** \`$VERSION\` · **Tag:** \`$TAG\`"
            echo ""
            echo "### Pipeline"
            echo ""
            echo "| Stage | Result |"
            echo "|-------|--------|"
            echo "| Quality Gate | $(pipeline_icon "$QG_RESULT") |"
            echo ""
            echo "### Store Publishing"
            echo ""
            echo "| Store | Result |"
            echo "|-------|--------|"
            echo "| Chrome Web Store | $(store_icon "$CHROME_RESULT" "$CHROME_OUTCOME") |"
            echo "| Firefox AMO | $(store_icon "$FIREFOX_RESULT" "$FIREFOX_OUTCOME") |"
            echo "| Edge Add-ons | $(store_icon "$EDGE_RESULT" "$EDGE_OUTCOME") |"
          } >> "$GITHUB_STEP_SUMMARY"
