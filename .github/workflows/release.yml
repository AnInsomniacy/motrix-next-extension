name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript compile check
        run: pnpm compile

      - name: Run tests
        run: pnpm test

      - name: Lint
        run: pnpm lint

      - name: i18n lint
        run: npx tsx scripts/lint-i18n.ts

      - name: Format check
        run: pnpm format:check

  package:
    name: Package & Publish (${{ matrix.browser }})
    needs: quality-gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        include:
          - browser: chrome
            zip_cmd: pnpm zip
          - browser: firefox
            zip_cmd: pnpm zip:firefox

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and package (${{ matrix.browser }})
        run: ${{ matrix.zip_cmd }}

      - name: Identify artifact
        id: artifact
        run: |
          ZIP=$(ls .output/*-mv3.zip)
          echo "path=$ZIP" >> "$GITHUB_OUTPUT"
          echo "name=$(basename $ZIP)" >> "$GITHUB_OUTPUT"
          echo "Packaged: $ZIP ($(du -h $ZIP | cut -f1))"

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "${{ steps.artifact.outputs.path }}" \
            --clobber \
            -R "${{ github.repository }}"

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: ${{ steps.artifact.outputs.path }}
          retention-days: 30

  # ── Store Publishing (production releases only) ──────────────────
  # These jobs are skipped for prerelease/beta tags and workflow_dispatch.
  # Gate: github.event.release.prerelease == false

  publish-chrome:
    name: Publish to Chrome Web Store
    needs: package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'release' && !github.event.release.prerelease
    outputs:
      outcome: ${{ steps.upload.outputs.outcome }}

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and package (Chromium)
        run: pnpm zip

      - name: Upload and publish to Chrome Web Store
        id: upload
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          ZIP_PATH=$(ls .output/*-chrome-mv3.zip)
          echo "Uploading $ZIP_PATH to Chrome Web Store..."

          OUTPUT=$(npx -y chrome-webstore-upload-cli upload \
            --source "$ZIP_PATH" \
            --extension-id "$EXTENSION_ID" \
            --client-id "$CLIENT_ID" \
            --client-secret "$CLIENT_SECRET" \
            --refresh-token "$REFRESH_TOKEN" \
            --auto-publish 2>&1) || true
          echo "$OUTPUT"

          # Graceful exit: item is locked in pending review from a prior submission
          if echo "$OUTPUT" | grep -q "ITEM_NOT_UPDATABLE"; then
            echo "::warning::Chrome Web Store: item is pending review, skipping upload"
            echo "outcome=skipped-pending-review" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Any other upload failure is a real error
          if echo "$OUTPUT" | grep -qi "FAILURE\|error"; then
            echo "::error::Chrome Web Store upload failed"
            exit 1
          fi

          echo "outcome=published" >> "$GITHUB_OUTPUT"

  publish-firefox:
    name: Publish to Firefox AMO
    needs: package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'release' && !github.event.release.prerelease
    outputs:
      outcome: ${{ steps.sign.outputs.outcome }}

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (Firefox)
        run: pnpm build:firefox

      - name: Package source code for AMO review
        run: git archive --format=zip --output=source-code.zip HEAD

      - name: Sign and submit to AMO
        id: sign
        run: |
          echo "Submitting to Firefox AMO (listed channel)..."

          EXIT_CODE=0
          OUTPUT=$(npx -y web-ext sign \
            --source-dir .output/firefox-mv3 \
            --channel listed \
            --api-key "${{ secrets.FIREFOX_API_KEY }}" \
            --api-secret "${{ secrets.FIREFOX_API_SECRET }}" \
            --upload-source-code source-code.zip 2>&1) || EXIT_CODE=$?
          echo "$OUTPUT"

          # Graceful exit: this version was already signed in a prior run
          if echo "$OUTPUT" | grep -q "already exists"; then
            echo "::warning::Firefox AMO: version already submitted, skipping"
            echo "outcome=skipped-version-exists" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$EXIT_CODE" -ne 0 ]; then exit $EXIT_CODE; fi
          echo "outcome=published" >> "$GITHUB_OUTPUT"

  publish-edge:
    name: Publish to Edge Add-ons
    needs: package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'release' && !github.event.release.prerelease
    outputs:
      outcome: ${{ steps.upload.outputs.outcome }}

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and package (Chromium)
        run: pnpm zip

      - name: Upload and publish to Edge Add-ons
        id: upload
        env:
          PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
          CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          API_KEY: ${{ secrets.EDGE_API_KEY }}
        run: |
          ZIP_PATH=$(ls .output/*-chrome-mv3.zip)
          echo "Uploading $ZIP_PATH to Edge Add-ons..."

          # Upload package to draft submission (API returns 202 with Location header)
          RESPONSE=$(curl -i -s -X POST \
            "https://api.addons.microsoftedge.microsoft.com/v1/products/${PRODUCT_ID}/submissions/draft/package" \
            -H "Authorization: ApiKey ${API_KEY}" \
            -H "X-ClientID: ${CLIENT_ID}" \
            -H "Content-Type: application/zip" \
            --data-binary "@${ZIP_PATH}")

          echo "Upload response (headers):" 
          echo "$RESPONSE" | head -20

          # Extract operation ID from Location header path using basename
          LOCATION=$(echo "$RESPONSE" | grep -i "^location:" | awk '{print $2}' | tr -d '\r\n')
          OPERATION_ID=$(basename "$LOCATION")
          echo "Upload operation ID: $OPERATION_ID"

          if [ -z "$OPERATION_ID" ] || [ "$OPERATION_ID" = "/" ]; then
            echo "::error::Edge Add-ons: failed to extract operation ID from Location header"
            echo "Full response:"
            echo "$RESPONSE"
            exit 1
          fi

          # Poll until upload validation completes (max 5 minutes)
          for i in $(seq 1 30); do
            sleep 10
            POLL_RESPONSE=$(curl -s \
              "https://api.addons.microsoftedge.microsoft.com/v1/products/${PRODUCT_ID}/submissions/draft/package/operations/${OPERATION_ID}" \
              -H "Authorization: ApiKey ${API_KEY}" \
              -H "X-ClientID: ${CLIENT_ID}")
            STATUS=$(echo "$POLL_RESPONSE" | jq -r '.status // empty')
            echo "Poll attempt $i: status=$STATUS"
            if [ "$STATUS" = "Succeeded" ]; then break; fi
            if [ "$STATUS" = "Failed" ]; then
              echo "::error::Edge Add-ons package validation failed"
              echo "$POLL_RESPONSE" | jq .
              exit 1
            fi
          done

          if [ "$STATUS" != "Succeeded" ]; then
            echo "::error::Edge Add-ons upload timed out after 5 minutes"
            exit 1
          fi

          # Submit draft for review
          echo "Publishing submission for review..."
          PUBLISH_RESPONSE=$(curl -i -s -X POST \
            "https://api.addons.microsoftedge.microsoft.com/v1/products/${PRODUCT_ID}/submissions/draft/publish" \
            -H "Authorization: ApiKey ${API_KEY}" \
            -H "X-ClientID: ${CLIENT_ID}" \
            -H "Content-Type: application/json" \
            -d '{"notes":"Automated submission via CI/CD pipeline."}')
          echo "$PUBLISH_RESPONSE" | head -5
          echo "Edge Add-ons submission published"
          echo "outcome=published" >> "$GITHUB_OUTPUT"

  # ── Release Summary ─────────────────────────────────────────────
  # Aggregates results from all jobs into a single GITHUB_STEP_SUMMARY table.
  # Runs on every release trigger, even if upstream jobs fail or are skipped.

  release-summary:
    name: Release Summary
    needs: [quality-gate, package, publish-chrome, publish-firefox, publish-edge]
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'release'

    steps:
      - name: Generate release summary
        env:
          TAG: ${{ github.event.release.tag_name }}
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
          QG_RESULT: ${{ needs.quality-gate.result }}
          PKG_RESULT: ${{ needs.package.result }}
          CHROME_RESULT: ${{ needs.publish-chrome.result }}
          CHROME_OUTCOME: ${{ needs.publish-chrome.outputs.outcome }}
          FIREFOX_RESULT: ${{ needs.publish-firefox.result }}
          FIREFOX_OUTCOME: ${{ needs.publish-firefox.outputs.outcome }}
          EDGE_RESULT: ${{ needs.publish-edge.result }}
          EDGE_OUTCOME: ${{ needs.publish-edge.outputs.outcome }}
        run: |
          VERSION="${TAG#v}"

          # Map job result to icon for pipeline stages
          pipeline_icon() {
            case "$1" in
              success) echo "✅ Passed" ;;
              failure) echo "❌ Failed" ;;
              skipped) echo "⏭️ Skipped" ;;
              *)       echo "❓ $1" ;;
            esac
          }

          # Map job result + outcome to icon for store publishing
          # result=skipped means the job condition was false (beta/dispatch)
          # result=failure means the job exited non-zero (real error)
          # result=success + outcome tells the real story
          store_icon() {
            local result="$1" outcome="$2"
            case "$result" in
              skipped) echo "⏭️ Not triggered" ;;
              failure) echo "❌ Failed" ;;
              success)
                case "$outcome" in
                  published)              echo "✅ Published" ;;
                  skipped-pending-review)  echo "⚠️ Skipped (pending review)" ;;
                  skipped-version-exists)  echo "⚠️ Skipped (version exists)" ;;
                  *)                      echo "✅ Success" ;;
                esac
                ;;
              *) echo "❓ $result" ;;
            esac
          }

          if [ "$IS_PRERELEASE" = "true" ]; then
            TRACK="Beta (prerelease)"
          else
            TRACK="Production"
          fi

          {
            echo "## 📦 Release Summary"
            echo ""
            echo "**Version:** \`$VERSION\` · **Tag:** \`$TAG\` · **Track:** $TRACK"
            echo ""
            echo "### Pipeline"
            echo ""
            echo "| Stage | Result |"
            echo "|-------|--------|"
            echo "| Quality Gate | $(pipeline_icon "$QG_RESULT") |"
            echo "| Package (Chrome + Firefox) | $(pipeline_icon "$PKG_RESULT") |"
            echo ""
            echo "### Store Publishing"
            echo ""
            echo "| Store | Result |"
            echo "|-------|--------|"
            echo "| Chrome Web Store | $(store_icon "$CHROME_RESULT" "$CHROME_OUTCOME") |"
            echo "| Firefox AMO | $(store_icon "$FIREFOX_RESULT" "$FIREFOX_OUTCOME") |"
            echo "| Edge Add-ons | $(store_icon "$EDGE_RESULT" "$EDGE_OUTCOME") |"
          } >> "$GITHUB_STEP_SUMMARY"
